name: Deploy App and Services

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v6

    - name: Build and push container image
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        docker build -t ghcr.io/frozenkro/dirtie-srv:${{ github.sha }} -t ghcr.io/frozenkro/dirtie-srv:latest .
        docker push ghcr.io/frozenkro/dirtie-srv:${{ github.sha }}
        docker push ghcr.io/frozenkro/dirtie-srv:latest

    - name: Set up SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KEY_RPIC1 }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H ${{ vars.HOST_IP }} >> ~/.ssh/known_hosts

    - name: Create .env
      run: |
        ssh -i ~/.ssh/id_ed25519 ${{ vars.HOST_USER }}@${{ vars.HOST_IP }} << 'EOF'
        mkdir -p ~/app
        cat > ~/app/.env << 'INNER'
        INFLUX_ORG=${{ vars.INFLUX_ORG }}
        INFLUX_DEFAULT_BUCKET=${{ vars.INFLUX_DEFAULT_BUCKET }}
        INFLUX_TOKEN=${{ secrets.INFLUX_TOKEN }}
        INFLUX_USERNAME=${{ vars.INFLUX_USERNAME }}
        INFLUX_PASSWORD=${{ secrets.INFLUX_PASSWORD }}

        POSTGRES_SERVER=${{ vars.POSTGRES_SERVER }}
        POSTGRES_DB=${{ vars.POSTGRES_DB }}
        POSTGRES_USER=${{ vars.POSTGRES_USER }}
        POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
        INNER
        EOF

    - name: Copy docker-compose.prod.yaml
      run: |
        scp -i ~/.ssh/id_ed25519 \
          docker-compose.prod.yaml \
          ${{ vars.HOST_USER }}@${{ vars.HOST_IP }}:~/app/docker-compose.yaml

    - name: Copy k8s manifests
      run: |
        scp -i ~/.ssh/id_ed25519 -r \
          k8s/ \
          ${{ vars.HOST_USER }}@${{ vars.HOST_IP }}:~/k8s/

    - name: Deploy data plane via SSH
      run: |
        ssh -i ~/.ssh/id_ed25519 ${{ vars.HOST_USER }}@${{ vars.HOST_IP }} << 'EOF'
          cd ~/app
          docker compose pull
          docker compose up -d --remove-orphans
        EOF

    - name: Deploy app to k3s cluster
      run: |
        ssh -i ~/.ssh/id_ed25519 ${{ vars.HOST_USER }}@${{ vars.HOST_IP }} << 'EOF'
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          kubectl create namespace dirtie --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic dirtie-secrets \
            --namespace dirtie \
            --from-literal=influx-token="${{ secrets.INFLUX_TOKEN }}" \
            --from-literal=postgres-password="${{ secrets.POSTGRES_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f ~/k8s/
          kubectl set image deployment/dirtie-srv app=ghcr.io/frozenkro/dirtie-srv:${{ github.sha }} -n dirtie
          kubectl rollout status deployment/dirtie-srv -n dirtie
        EOF
